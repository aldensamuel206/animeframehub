<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AnimeFrameHub Posters</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
color:white;
background:url("adsf.png") no-repeat center center fixed;
background-size:cover;
}

/* overlay */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(5,10,20,0.85);
z-index:-1;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

header h1{
background:linear-gradient(90deg,#00f0ff,#a000ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav a{
color:#ccc;
margin-left:25px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#00f0ff;
text-shadow:0 0 10px #00f0ff;
}

.poster-section{
padding:80px 10%;
text-align:center;
}

.poster-section h2{
font-size:2.5rem;
margin-bottom:50px;
background:linear-gradient(90deg,#00f0ff,#a000ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.poster-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.poster-grid img{
width:100%;
border-radius:15px;
transition:0.4s;
}

.poster-grid img:hover{
transform:scale(1.08);
box-shadow:0 0 25px #00f0ff55;
}

</style>
</head>

<body>

<header>
<h1>AnimeFrameHub</h1>
<nav>
<a href="index.html">Home</a>
<a href="index.html#shop">Shop</a>
<a href="index.html">About</a>
<a href="index.html">Contact</a>
<a href="posters.html">View Posters</a>
</nav>
</header>

<section class="poster-section">
<h2>Sample Posters</h2>

<div class="poster-grid">

<img src="img1.png">
<img src="img2.png">
<img src="img3.png">
<img src="img4.png">
<img src="img5.png">
<img src="img6.png">
<img src="img7.png">
<img src="img8.png">
<img src="img9.png">
<img src="img10.png">

</div>

</section>

</body>
</html>
